version: '3.8'

services:
  reliability-app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - PORT=3000
      - DATABASE_PATH=/app/data/reliability.db
    volumes:
      - reliability_data:/app/data

volumes:
  reliability_data:
    driver: local
